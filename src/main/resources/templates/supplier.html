

<!DOCTYPE html>
<html>
<head>
    <title>Supplier Registration</title>
    <style>
        body { background-size: cover; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; font-family: Arial, sans-serif; }
        .reg-box { background: rgba(255, 255, 255, 0.95); padding: 35px; border-radius: 12px; width: 400px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; }
        button { width: 95%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #1a252f; }
    </style>
</head>
<body>
    <div class="reg-box">
        <h2>Supplier Onboarding</h2>
		<form action="/supplier/register" method="POST">
           <input type="text" name="supplier_name" placeholder="Supplier Name" required>
            <input type="text" name="agencyId" placeholder="Company Registration ID (Unique)" required>
            <input type="tel" name="phone_no" placeholder="Contact Number" pattern="\d{10}" title="Phone number must be exactly 10 digits" maxlength="10" required>
            <input type="text" name="email" placeholder="Email Address" required>
             <input type="password" name="password" placeholder="Create Login Password" required>
            <button type="submit" name="reg_supplier">Register Supplier</button>
        </form>
    </div>
</body>
</html>
