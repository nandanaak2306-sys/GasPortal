<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Success</title>
	<style>
	    body { 
	        font-family: 'Outfit', sans-serif; background-color: #f5f7fb; 
	        display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; 
	    }
	    .success-card { 
	        background: white; padding: 40px; border-radius: 12px; 
	        box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 380px; text-align: center;
	        border: 1px solid rgba(15,31,61,0.1);
	    }
	    .icon { font-size: 48px; color: #16a34a; margin-bottom: 20px; }
	    h2 { color: #0f1f3d; margin-bottom: 25px; font-weight: 500; }
	    .details { text-align: left; margin-bottom: 25px; border-top: 1px solid #f0f2f5; padding-top: 20px; }
	    .row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.95rem; }
	    .label { color: #5a6a85; }
	    .value { font-weight: 500; color: #0f1f3d; }
	    .btn-home { 
	        display: inline-block; width: 100%; padding: 12px; background-color: #1a56db; 
	        color: white; text-decoration: none; border-radius: 6px; font-weight: 500; box-sizing: border-box;
	    }
	</style>
</head>
<body>

<div class="success-card">
    <div class="icon">✔</div>
    <h2>Payment Confirmed!</h2>
    
    <div class="details">
        <div class="row">
            <span class="label">Booking ID:</span>
            <span class="value" th:text="${orders.booking_id}"></span>
        </div>
        <div class="row">
            <span class="label">Amount Paid:</span>
            <span class="value">₹<span th:text="${payment.amount}">850.00</span></span>
        </div>
        <div class="row">
            <span class="label">Method:</span>
            <span class="value" th:text="${payment.paymentMethod}">Online</span>
        </div>
        <div class="row">
            <span class="label">Status:</span>
            <span class="value" style="color: #28a745;">SUCCESS</span>
        </div>
        <div class="row">
            <span class="label">Date:</span>
            <span class="value" th:text="${payment.paymentDate}">2026-03-12</span>
        </div>
    </div>

    <a href="/user/dashboard" class="btn-home">Return to Dashboard</a>
</div>

</body>
</html>
